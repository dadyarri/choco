version: "3.7"

services:

  postgres:
    container_name: choco_postgres
    image: postgres:13.3
    environment:
      POSTGRES_DB: "choco"
      POSTGRES_USER: "dadyarri"
      POSTGRES_PASSWORD: "mjro10011"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - /dump.sql:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
    ports:
      - "10000:5432"
    restart: always
    networks:
      - net

  api:
    container_name: choco_api
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - 8080
    ports:
      - "8080:8000"
    env_file: .env
    environment:
      PYTHONPATH: api
    restart: always
    command: uvicorn api.main:app --host choco.api
    volumes:
      - ./api:/code/api
    links:
      - postgres
    depends_on:
      - postgres
    networks:
      net:
        aliases:
          - choco.api

  vkontakte:
    container_name: choco_vk
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: bot
    command: python /code/bot/main.py
    links:
      - api
    volumes:
      - ./bot:/code/bot
    depends_on:
      - api
    networks:
      - net

  telegram:
    container_name: choco_tg
    build:
      context: .
      dockerfile: tg/Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: tg
    command: python /code/tg/main.py
    volumes:
      - ./tg:/code/tg
    depends_on:
      - api
    networks:
      - net


volumes:
  db_data: {}

networks:
  net:
    driver: bridge
